name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Fetch market texture asset
        run: node scripts/fetch-market-texture.mjs
        env:
          MARKET_TEXTURE_UPSTREAM_URL: ${{ secrets.MARKET_TEXTURE_UPSTREAM_URL }}
          MARKET_TEXTURE_API_TOKEN: ${{ secrets.MARKET_TEXTURE_API_TOKEN }}
          MARKET_TEXTURE_API_KEY: ${{ secrets.MARKET_TEXTURE_API_KEY }}

      - name: Build static site
        run: npm run build
        env:
          STATIC_EXPORT: '1'
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
